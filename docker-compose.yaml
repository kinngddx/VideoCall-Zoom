services:
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit-server
    restart: unless-stopped
    command: --config /etc/livekit.yaml

    volumes:
      - ./livekit.yaml:/etc/livekit.yaml

    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882-7883:7882-7883/udp"